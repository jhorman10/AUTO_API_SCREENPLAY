# ============================================================================
# Serenity Configuration for AUTO_API_SCREENPLAY
# ============================================================================

# Webdriver Configuration
webdriver.driver=rest

# Test Root Package
serenity.test.root=com.maestria.qa

# Reporting
serenity.outputDirectory=target/site/serenity
serenity.report.encoding=UTF-8
serenity.logging=VERBOSE

# Screenshot Configuration (not used in REST API testing, but leave for compatibility)
serenity.take.screenshots=DISABLED

# API Configuration
api.base.url=http://localhost:3000
api.timeout=5000
api.max.retries=1

# Cucumber Configuration
serenity.tag.exclusions=@wip,@manual

# Logging Configuration
logging.level.root=INFO
logging.level.com.maestria.qa=DEBUG

# Report Configuration
serenity.report.title=AUTO_API_SCREENPLAY - Test Execution Report
serenity.report.show.step.details=true
serenity.report.show.pie.charts=true
